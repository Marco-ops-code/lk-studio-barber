name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Vérifier le démarrage du serveur
        run: |
          timeout 5s node server.js || [ $? -eq 124 ]
        env:
          PORT: 3000
          ADMIN_PASSWORD: test
